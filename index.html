<!doctype html>

<html lang="en">

<head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Bookmark Manager</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family:
                system-ui,
                -apple-system,
                sans-serif;

            max-width: 640px;

            margin: 2rem auto;

            padding: 0 1rem;

            background: #f9fafb;

            color: #1f2937;
        }

        h1 {
            margin-bottom: 1.5rem;
        }

        form {
            display: flex;

            flex-direction: column;

            gap: 0.5rem;

            margin-bottom: 2rem;

            padding: 1rem;

            background: #fff;

            border-radius: 8px;

            border: 1px solid #e5e7eb;
        }

        input,
        button {
            padding: 0.5rem;

            font-size: 1rem;

            border: 1px solid #d1d5db;

            border-radius: 4px;
        }

        button {
            cursor: pointer;

            background: #7c3aed;

            color: white;

            border: none;

            font-weight: 600;
        }

        button:hover {
            background: #6d28d9;
        }

        .bookmark {
            padding: 1rem;

            margin-bottom: 0.75rem;

            background: #fff;

            border-radius: 8px;

            border: 1px solid #e5e7eb;

            display: flex;

            justify-content: space-between;

            align-items: center;
        }

        .bookmark a {
            color: #7c3aed;
            text-decoration: none;
            font-weight: 600;
        }

        .bookmark a:hover {
            text-decoration: underline;
        }

        .bookmark p {
            font-size: 0.875rem;
            color: #6b7280;
            margin-top: 0.25rem;
        }

        .delete-btn {
            background: #ef4444;

            padding: 0.3rem 0.75rem;

            font-size: 0.8rem;
        }

        .delete-btn:hover {
            background: #dc2626;
        }

        #error {
            color: #ef4444;

            margin-bottom: 1rem;

            display: none;
        }
    </style>
</head>

<body>
    <h1>Bookmark Manager</h1>

    <p id="error"></p>

    <form id="bookmark-form">
        <input type="url" id="url" placeholder="https://example.com" required />

        <input type="text" id="title" placeholder="Title" required />

        <input type="text" id="description" placeholder="Description (optional)" />

        <button type="submit">Save Bookmark</button>
    </form>

    <div id="bookmark-list"></div>

    <script>
        const API = "http://127.0.0.1:8000";

        // --- Helper: show an error message ---

        function showError(msg) {
            const el = document.getElementById("error");

            el.textContent = msg;

            el.style.display = "block";

            setTimeout(() => (el.style.display = "none"), 4000);
        }

        // --- Fetch and display all bookmarks ---

        async function loadBookmarks() {
            try {
                const res = await fetch(`${API}/bookmarks`);

                if (!res.ok) throw new Error("Failed to load bookmarks");

                const data = await res.json();

                renderBookmarks(data);
            } catch (err) {
                showError(err.message);
            }
        }

        // --- Render the bookmark list ---

        function renderBookmarks(bookmarks) {
            const list = document.getElementById("bookmark-list");

            list.innerHTML = "";

            bookmarks.forEach((b) => {
                const div = document.createElement("div");

                div.className = "bookmark";

                div.innerHTML = `

            <div>

                <a href="${b.url}" target="_blank">${b.title}</a>

                <p>${b.description}</p>

            </div>

            <button class="delete-btn" onclick="deleteBookmark(${b.id})">

                Delete

            </button>

        `;

                list.appendChild(div);
            });
        }

        // --- Create a new bookmark ---

        async function createBookmark(e) {
            e.preventDefault();

            const body = {
                url: document.getElementById("url").value,

                title: document.getElementById("title").value,

                description: document.getElementById("description").value,
            };

            try {
                const res = await fetch(`${API}/bookmarks`, {
                    method: "POST",

                    headers: { "Content-Type": "application/json" },

                    body: JSON.stringify(body),
                });

                if (!res.ok) throw new Error("Failed to create bookmark");

                document.getElementById("bookmark-form").reset();

                loadBookmarks();
            } catch (err) {
                showError(err.message);
            }
        }

        // --- Delete a bookmark ---

        async function deleteBookmark(id) {
            try {
                const res = await fetch(`${API}/bookmarks/${id}`, {
                    method: "DELETE",
                });

                if (!res.ok) throw new Error("Failed to delete bookmark");

                loadBookmarks();
            } catch (err) {
                showError(err.message);
            }
        }

        // --- Wire up the form and load initial data ---

        document
            .getElementById("bookmark-form")
            .addEventListener("submit", createBookmark);

        loadBookmarks();
    </script>
</body>

</html>
